<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internal Policy Assistant</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 24px; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
        }
        #answer {
            margin-top: 24px;
            padding: 16px;
            background: #f5f5f5;
            border-radius: 4px;
            white-space: pre-wrap;
            display: none;
        }
        #error { color: red; margin-top: 12px; }
        #loader { margin-top: 12px; display: none; }
    </style>
</head>
<body>
    <h1>Internal Policy Assistant</h1>
    <input type="text" id="question" placeholder="Ask a question about the company policy..." />
    <br>
    <button onclick="ask()">Ask</button>
    <div id="loader">Thinking...</div>
    <div id="error"></div>
    <div id="answer"></div>

    <script>
        async function ask() {
            const question = document.getElementById("question").value.trim();
            const answerBox = document.getElementById("answer");
            const errorBox = document.getElementById("error");

            answerBox.style.display = "none";
            errorBox.textContent = "";

            if (!question) return;

            const loader = document.getElementById("loader");
            loader.style.display = "block";
            await new Promise(r => setTimeout(r, 0));

            try {
                const response = await fetch(`/ask?question=${encodeURIComponent(question)}`, {
                    method: "POST",
                });
                if (response.ok) {
                    answerBox.textContent = await response.json();
                    answerBox.style.display = "block";
                } else {
                    errorBox.textContent = `Error ${response.status}: ${await response.text()}`;
                }
            } catch (e) {
                errorBox.textContent = "Could not reach the API. Is the server running?";
            } finally {
                loader.style.display = "none";
            }
        }

        document.getElementById("question").addEventListener("keydown", (e) => {
            if (e.key === "Enter") ask();
        });
    </script>
</body>
</html>
